repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.8
    hooks:
      - id: clang-format
        types: [c++]
        exclude: |
          (?x)^(
            doctest/doctest\.h|
            examples/.*|
            scripts/.*|
            tests/.*
          )$

  - repo: local
    hooks:
      - id: assemble-doctest
        name: assemble doctest.h
        language: python
        entry: python scripts/assemble.py
        pass_filenames: false
        files: ^(scripts/assemble.py$|doctest/.*)
