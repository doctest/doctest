name: CI Linux

on:
  push:
    paths-ignore:
      - "doc/**"
      - "scripts/**"
      - "LICENSE.txt"
      - "README.md"
  pull_request:
    paths-ignore:
      - "doc/**"
      - "scripts/**"
      - "LICENSE.txt"
      - "README.md"

env:
  CTEST_OUTPUT_ON_FAILURE: ON
  CTEST_PARALLEL_LEVEL: 2

jobs:
  ci-linux:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ${{ matrix.os }}

    env:
      CMAKE_GENERATOR: Ninja
      ASAN_OPTIONS: strict_string_checks=true:detect_odr_violation=2:detect_stack_use_after_return=true:check_initialization_order=true:strict_init_order=true
      TSAN_OPTIONS: force_seq_cst_atomics=1

    strategy:
      fail-fast: false
      matrix:
        include:
          - container: ubuntu:18.04
            compiler: gcc
            version: "4.8"
            os: ubuntu-24.04

          - container: ubuntu:18.04
            compiler: gcc
            version: "5"
            os: ubuntu-24.04

          - container: ubuntu:18.04
            compiler: gcc
            version: "6"
            os: ubuntu-24.04

          - container: ubuntu:18.04
            compiler: gcc
            version: "7"
            os: ubuntu-24.04

          - container: ubuntu:18.04
            compiler: gcc
            version: "8"
            os: ubuntu-24.04

          - os: ubuntu-22.04
            compiler: gcc
            version: "9"

          - os: ubuntu-24.04
            compiler: gcc
            version: "10"

          - os: ubuntu-24.04
            compiler: gcc
            version: "11"

          - os: ubuntu-24.04
            compiler: gcc
            version: "12"

          - os: ubuntu-24.04
            compiler: gcc
            version: "13"

          - os: ubuntu-24.04
            compiler: gcc
            version: "14"

          - container: ubuntu:18.04
            compiler: clang
            version: "3.9"
            os: ubuntu-24.04

          - container: ubuntu:18.04
            compiler: clang
            version: "4.0"
            os: ubuntu-24.04

          - container: ubuntu:18.04
            compiler: clang
            version: "5.0"
            os: ubuntu-24.04

          - container: ubuntu:20.04
            compiler: clang
            version: "6.0"
            os: ubuntu-24.04

          - container: ubuntu:20.04
            compiler: clang
            version: "7"
            os: ubuntu-24.04

          - container: ubuntu:20.04
            compiler: clang
            version: "8"
            os: ubuntu-24.04

          - container: ubuntu:20.04
            compiler: clang
            version: "9"
            os: ubuntu-24.04

          - container: ubuntu:20.04
            compiler: clang
            version: "10"
            os: ubuntu-24.04

          - os: ubuntu-22.04
            compiler: clang
            version: "11"

          - os: ubuntu-22.04
            compiler: clang
            version: "12"

          - os: ubuntu-22.04
            compiler: clang
            version: "13"

          - os: ubuntu-24.04
            compiler: clang
            version: "14"

          - os: ubuntu-24.04
            compiler: clang
            version: "15"

          - os: ubuntu-24.04
            compiler: clang
            version: "16"

          - os: ubuntu-24.04
            compiler: clang
            version: "17"

          - os: ubuntu-24.04
            compiler: clang
            version: "18"

    steps:
      - uses: actions/checkout@v2

      # Ref: https://github.com/actions/checkout/issues/1590#issuecomment-2567109195
      - name: Prepare container (Linux, containerized)
        if: matrix.container != ''
        run: |
          docker pull ${{ matrix.container }}
          docker run --name build-container -d -v ${{ github.workspace }}:/workspace ${{ matrix.container }} tail -f /dev/null

          cat <<'EOF' > container-env.sh
          export CTEST_OUTPUT_ON_FAILURE="${{ env.CTEST_OUTPUT_ON_FAILURE }}"
          export CTEST_PARALLEL_LEVEL="${{ env.CTEST_PARALLEL_LEVEL }}"
          export CMAKE_GENERATOR="${{ env.CMAKE_GENERATOR }}"
          export ASAN_OPTIONS="${{ env.ASAN_OPTIONS }}"
          export TSAN_OPTIONS="${{ env.TSAN_OPTIONS }}"
          EOF

      - name: Install (Linux)
        if: matrix.container == ''
        run: |
          # Required for libc6-dbg:i386 and g++-multilib packages which are
          # needed for x86 builds.
          sudo dpkg --add-architecture i386

          sudo apt-get update
          sudo apt-get install -y cmake ninja-build valgrind libc6-dbg:i386

          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y g++-${{ matrix.version }} g++-${{ matrix.version }}-multilib
          elif [ "${{ matrix.compiler }}" = "clang" ]; then
            # clang-17 does not automatically provide the i386 sanitizer runtimes,
            # but libclang-rt-V-dev:i386 does not always exist. This is the best intermediate option
            if [ "${{ matrix.version }}" = "17" ]; then
              sudo apt-get install -y libclang-rt-${{ matrix.version }}-dev:i386
            fi

            sudo apt-get install -y clang-${{ matrix.version }} libclang-${{ matrix.version }}-dev llvm-${{ matrix.version }}-dev g++-multilib
          fi

      - name: Install (Linux, containerized)
        if: matrix.container != ''
        env:
          CMD: |
            dpkg --add-architecture i386

            # Configure Kitware repo for newer version of CMake.
            if [ "${{ matrix.container }}" = "ubuntu:18.04" ]; then
              apt-get update && apt-get install -y wget gpg
              wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | gpg --dearmor - | tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
              echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ bionic main' | tee /etc/apt/sources.list.d/kitware.list >/dev/null
            fi

            apt-get update
            apt-get install -y cmake ninja-build valgrind libc6-dbg:i386 python3

            if [ "${{ matrix.compiler }}" = "gcc" ]; then
              apt-get install -y g++-${{ matrix.version }} g++-${{ matrix.version }}-multilib
            elif [ "${{ matrix.compiler }}" = "clang" ]; then
              apt-get install -y clang-${{ matrix.version }} libclang-${{ matrix.version }}-dev llvm-${{ matrix.version }}-dev g++-multilib
            fi
        run: docker exec build-container bash -c "$CMD"

      - name: Build & Test ${{ runner.arch }}
        if: matrix.container == ''
        run: python3 .github/workflows/build_and_test.py Linux ${{ runner.arch }} ${{ matrix.compiler }} ${{ matrix.version }}

      - name: Build & Test ${{ runner.arch }} (Linux, containerized)
        if: matrix.container != ''
        env:
          CMD: |
            cd /workspace
            source container-env.sh
            python3 .github/workflows/build_and_test.py Linux ${{ runner.arch }} ${{ matrix.compiler }} ${{ matrix.version }}
        run: docker exec build-container bash -c "$CMD"

      - name: Build & Test X86
        if: matrix.container == ''
        run: python3 .github/workflows/build_and_test.py Linux x86 ${{ matrix.compiler }} ${{ matrix.version }}

      - name: Build & Test X86 (Linux, containerized)
        if: matrix.container != ''
        env:
          CMD: |
            cd /workspace
            source container-env.sh
            python3 .github/workflows/build_and_test.py Linux x86 ${{ matrix.compiler }} ${{ matrix.version }}
        run: docker exec build-container bash -c "$CMD"
